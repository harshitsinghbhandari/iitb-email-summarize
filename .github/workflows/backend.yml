name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "db/**"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  test:
    name: pytest + lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black mypy

      - name: Black --check
        run: black --check backend db

      - name: Mypy
        run: mypy backend db || true

      - name: Pytest
        run: pytest -q
