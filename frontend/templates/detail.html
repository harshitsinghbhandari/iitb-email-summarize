<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Detail - Inbox Broadcast</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(30, 41, 59, 0.9);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .detail-card {
            width: 100%;
            max-width: 900px;
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .back-btn:hover { transform: translateX(-5px); }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #5865F2;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.1s;
            margin-top: 1rem;
        }
        .discord-btn:hover { background: #4752C4; }
        .discord-btn:active { transform: scale(0.98); }
        .discord-btn:disabled { background: #4b4b4b; cursor: not-allowed; opacity: 0.7; }

        .email-meta {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .summary-section {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--accent);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .summary-label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .summary-text {
            color: #d1d5db;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .summary-text p { margin-bottom: 0.8rem; }
        .summary-text ul { margin-bottom: 0.8rem; padding-left: 1.2rem; }
        .summary-text li { margin-bottom: 0.3rem; }
        .summary-text strong { color: var(--text-main); }

        h1 { font-size: 2rem; margin-bottom: 1rem; line-height: 1.3; }

        .meta-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; font-size: 1rem; }
        .label { color: var(--text-muted); width: 60px; flex-shrink: 0; }
        
        .email-content {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #e2e8f0;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        .email-content img { max-width: 100%; height: auto; border-radius: 8px; }
        .email-content a { color: var(--accent); }

        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-top-color: var(--accent);
            animation: spin 1s infinite linear; margin: 5rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Notification */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 1000;
        }

        .toast {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            animation: slideIn 0.3s forwards;
            max-width: 300px;
            border-left: 4px solid var(--accent);
        }

        .toast.error { border-left-color: var(--error); }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container" id="detail-container">
        <div class="loader"></div>
    </div>
    <div id="toast-container"></div>

    <script>
        const uid = {{ uid | tojson }};
        const container = document.getElementById('detail-container');
        const toastContainer = document.getElementById('toast-container');

        const ALLOWED_MARKDOWN_TAGS = new Set(['P', 'BR', 'STRONG', 'EM', 'UL', 'OL', 'LI', 'CODE', 'PRE', 'BLOCKQUOTE', 'A']);

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function renderMarkdownSafe(markdown) {
            const template = document.createElement('template');
            template.innerHTML = marked.parse(String(markdown ?? ''));

            function sanitize(node) {
                [...node.children].forEach(child => {
                    sanitize(child);

                    if (!ALLOWED_MARKDOWN_TAGS.has(child.tagName)) {
                        child.replaceWith(document.createTextNode(child.textContent));
                        return;
                    }

                    if (child.tagName === 'A') {
                        const href = child.getAttribute('href') || '';
                        [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
                        if (/^https?:\/\//i.test(href)) {
                            child.setAttribute('href', href);
                            child.setAttribute('target', '_blank');
                            child.setAttribute('rel', 'noopener noreferrer');
                        }
                    } else {
                        [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
                    }
                });
            }

            sanitize(template.content);
            return template.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.innerText = message;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function fetchEmailDetail() {
            try {
                const response = await fetch(`/api/email/${uid}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    renderDetail(data.data);
                } else {
                    container.innerHTML = `<div class="detail-card" style="text-align:center">
                        <h1 style="color:var(--error)">Error</h1>
                        <p>${escapeHTML(data.message)}</p>
                        <a href="/" class="back-btn" style="margin-top:2rem">← Back to Inbox</a>
                    </div>`;
                }
            } catch (e) {
                container.innerHTML = `<div class="detail-card" style="text-align:center">
                    <h1 style="color:var(--error)">Error</h1>
                    <p>Failed to load email.</p>
                    <a href="/" class="back-btn" style="margin-top:2rem">← Back to Inbox</a>
                </div>`;
            }
        }

        function renderDetail(email) {
            container.innerHTML = `
                <div class="detail-card">
                    <a href="/" class="back-btn">← Back to Inbox</a>
                    <div class="email-meta">
                        <h1>${escapeHTML(email.subject)}</h1>
                        <div class="meta-row">
                            <span class="label">From:</span>
                            <span>${escapeHTML(email.sender)}</span>
                        </div>
                        <div class="meta-row">
                            <span class="label">Date:</span>
                            <span>${escapeHTML(email.date)}</span>
                        </div>
                    </div>

                    <div class="summary-section">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <span class="summary-label">AI Summary</span>
                            <button class="discord-btn" type="button" data-uid="${escapeHTML(email.uid)}">Send to Discord</button>
                        </div>
                        <div class="summary-text">${renderMarkdownSafe(email.summary || 'No summary available.')}</div>
                    </div>

                    <div class="email-content"></div>
                </div>
            `;

            container.querySelector('.email-content').textContent = email.body || 'No content.';
            container.querySelector('.discord-btn').addEventListener('click', event => {
                sendToDiscord(event.currentTarget.dataset.uid, event.currentTarget);
            });
        }

        async function sendToDiscord(uid, btn) {
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const response = await fetch(`/api/email/${encodeURIComponent(uid)}/discord`, { method: 'POST' });
                const data = await response.json();
                if (data.status === 'success') {
                    btn.innerText = "Sent! ✅";
                    showToast("Successfully sent to Discord!");
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerText = originalText;
                    }, 3000);
                } else {
                    showToast(data.message || "Failed to send", "error");
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (e) {
                showToast("Network error while sending to Discord", "error");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        fetchEmailDetail();
    </script>
</body>
</html>
