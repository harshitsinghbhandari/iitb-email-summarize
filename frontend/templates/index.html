<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Mail Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(30, 41, 59, 0.9);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
        }

        header { text-align: center; margin-bottom: 3rem; }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 1rem; }

        .email-card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s forwards ease-out;
        }

        .email-card:hover { background: var(--surface-hover); transform: translateY(-3px); }

        .email-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .email-sender { font-weight: 600; color: var(--text-main); }
        .email-date { font-size: 0.85rem; color: var(--text-muted); }
        
        .email-subject { font-weight: 500; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .email-snippet { color: var(--text-muted); font-size: 0.9rem; line-height: 1.4; }

        /* Summary Overlay */
        .summary-overlay {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            animation: fadeIn 0.4s ease-in-out;
        }

        .summary-text {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent);
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #d1d5db;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .summary-text p { margin-bottom: 0.8rem; }
        .summary-text ul { margin-bottom: 0.8rem; padding-left: 1.2rem; }
        .summary-text li { margin-bottom: 0.3rem; }
        .summary-text strong { color: var(--text-main); }

        .detail-btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .detail-btn:hover { opacity: 0.9; }

        .loader {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-top-color: var(--accent);
            animation: spin 1s infinite linear;
        }

        /* Toast Notification */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 1000;
        }

        .toast {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            animation: slideIn 0.3s forwards;
            max-width: 300px;
            border-left: 4px solid var(--accent);
        }

        .toast.error { border-left-color: var(--error); }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .error-state {
            text-align: center;
            padding: 3rem;
            background: var(--surface-color);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .error-state h2 { color: var(--error); margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>Inbox Broadcast</h1>
    </header>

    <div class="container" id="email-container"></div>
    <div id="toast-container"></div>

    <script>
        const container = document.getElementById('email-container');
        const toastContainer = document.getElementById('toast-container');

        const ALLOWED_MARKDOWN_TAGS = new Set(['P', 'BR', 'STRONG', 'EM', 'UL', 'OL', 'LI', 'CODE', 'PRE', 'BLOCKQUOTE', 'A']);

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function renderMarkdownSafe(markdown) {
            const template = document.createElement('template');
            template.innerHTML = marked.parse(String(markdown ?? ''));

            function sanitize(node) {
                [...node.children].forEach(child => {
                    sanitize(child);

                    if (!ALLOWED_MARKDOWN_TAGS.has(child.tagName)) {
                        child.replaceWith(document.createTextNode(child.textContent));
                        return;
                    }

                    if (child.tagName === 'A') {
                        const href = child.getAttribute('href') || '';
                        [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
                        if (/^https?:\/\//i.test(href)) {
                            child.setAttribute('href', href);
                            child.setAttribute('target', '_blank');
                            child.setAttribute('rel', 'noopener noreferrer');
                        }
                    } else {
                        [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
                    }
                });
            }

            sanitize(template.content);
            return template.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.innerText = message;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function fetchEmails() {
            try {
                const res = await fetch('/api/emails');
                const data = await res.json();
                if (data.status === 'success') {
                    renderEmails(data.data);
                } else {
                    container.innerHTML = `
                        <div class="error-state">
                            <h2>Connection Error</h2>
                            <p>${escapeHTML(data.message)}</p>
                        </div>
                    `;
                }
            } catch (e) {
                showToast("Failed to connect to server", "error");
            }
        }

        function renderEmails(emails) {
            container.innerHTML = '';
            if (emails.length === 0) {
                container.innerHTML = '<div class="error-state"><p>No emails found in inbox.</p></div>';
                return;
            }
            emails.forEach((email, i) => {
                const uidKey = encodeURIComponent(email.uid);
                const card = document.createElement('div');
                card.className = 'email-card';
                card.style.animationDelay = `${i * 0.05}s`;
                
                card.innerHTML = `
                    <div class="email-header">
                        <div class="email-sender">${escapeHTML(email.sender)}</div>
                        <div class="email-date">${escapeHTML(email.date)}</div>
                    </div>
                    <div class="email-subject">${escapeHTML(email.subject)}</div>
                    <div class="email-snippet">${escapeHTML(email.snippet)}</div>
                    <div class="summary-overlay" id="summary-${uidKey}">
                        <div class="summary-text" id="text-${uidKey}" data-loaded="false">
                             <div class="loader"></div> Summarizing with AI...
                        </div>
                        <a href="/email/${uidKey}" class="detail-btn">View Full Email</a>
                    </div>
                `;
                
                card.onclick = (e) => {
                    if (e.target.classList.contains('detail-btn')) return;
                    toggleSummary(email.uid);
                };
                
                container.appendChild(card);
            });
        }

        async function toggleSummary(uid) {
            const uidKey = encodeURIComponent(uid);
            const overlay = document.getElementById(`summary-${uidKey}`);
            const textEl = document.getElementById(`text-${uidKey}`);
            
            if (overlay.style.display === 'block') {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'block';
                if (textEl.dataset.loaded !== 'true') {
                    try {
                        const res = await fetch(`/api/email/${encodeURIComponent(uid)}/summary`);
                        const data = await res.json();
                        if (data.status === 'success') {
                            textEl.innerHTML = renderMarkdownSafe(data.summary);
                            textEl.dataset.loaded = 'true';
                        } else {
                            textEl.innerText = data.message || "Error fetching summary.";
                            textEl.dataset.loaded = 'true';
                            showToast(data.message || "Summary failed", "error");
                        }
                    } catch (e) {
                        textEl.innerText = "Failed to load summary.";
                        textEl.dataset.loaded = 'true';
                        showToast("Server error while summarizing", "error");
                    }
                }
            }
        }

        fetchEmails();
    </script>
</body>
</html>
