<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { font-family: 'Outfit', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .back-btn:hover { transform: translateX(-5px); }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #5865F2;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.1s;
            margin-top: 1rem;
        }
        .discord-btn:hover { background: #4752C4; }
        .discord-btn:active { transform: scale(0.98); }
        .discord-btn:disabled { background: #4b4b4b; cursor: not-allowed; opacity: 0.7; }

        .email-meta {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .summary-section {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--accent);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .summary-label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .summary-text {
            color: #d1d5db;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        h1 { font-size: 2rem; margin-bottom: 1rem; line-height: 1.3; }

        .meta-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; font-size: 1rem; }
        .label { color: var(--text-muted); width: 60px; flex-shrink: 0; }
        
        .email-content {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #e2e8f0;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        .email-content img { max-width: 100%; height: auto; border-radius: 8px; }
        .email-content a { color: var(--accent); }

        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-top-color: var(--accent);
            animation: spin 1s infinite linear; margin: 5rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container" id="detail-container">
        <div class="loader"></div>
    </div>

    <script>
        const uid = "{{ uid }}";
        const container = document.getElementById('detail-container');

        async function fetchEmailDetail() {
            try {
                const response = await fetch(`/api/email/${uid}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    renderDetail(data.data);
                } else {
                    container.innerHTML = `<h1>Error</h1><p>${data.message}</p>`;
                }
            } catch (e) {
                container.innerHTML = `<h1>Error</h1><p>Failed to load email.</p>`;
            }
        }

        function renderDetail(email) {
            container.innerHTML = `
                <a href="/" class="back-btn">← Back to Inbox</a>
                <div class="email-meta">
                    <h1>${email.subject}</h1>
                    <div class="meta-row">
                        <span class="label">From:</span>
                        <span>${email.sender}</span>
                    </div>
                    <div class="meta-row">
                        <span class="label">Date:</span>
                        <span>${email.date}</span>
                    </div>
                </div>

                <div class="summary-section">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <span class="summary-label">AI Summary</span>
                        <button class="discord-btn" onclick="sendToDiscord('${email.uid}')">Send to Discord</button>
                    </div>
                    <div class="summary-text">${email.summary}</div>
                </div>

                <div class="email-content">${email.body}</div>
            `;
        }

        async function sendToDiscord(uid) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const response = await fetch(`/api/email/${uid}/discord`, { method: 'POST' });
                const data = await response.json();
                if (data.status === 'success') {
                    btn.innerText = "Sent! ✅";
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerText = originalText;
                    }, 3000);
                } else {
                    alert("Error: " + data.message);
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (e) {
                alert("Failed to send to Discord.");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        fetchEmailDetail();
    </script>
</body>
</html>
